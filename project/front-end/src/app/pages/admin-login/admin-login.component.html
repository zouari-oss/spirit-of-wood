<section class="auth-page">
  <div class="grain-overlay"></div>
  <div class="auth-card reveal-up">
    <div class="brand-row">
      <img src="/logo.png" alt="Spirit Of Wood" class="logo" />
      <div>
        <p class="eyebrow">Spirit Of Wood</p>
        <h1>Admin Workshop</h1>
      </div>
    </div>

    <p class="subtitle">Sign in to craft and manage your article collection.</p>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Email
        <input type="email" formControlName="email" />
      </label>

      <label>
        Password
        <input type="password" formControlName="password" />
      </label>

      <button type="submit" [disabled]="loading()" class="primary-btn">
        {{ loading() ? 'Entering workshop...' : 'Enter Workshop' }}
      </button>
    </form>
  </div>
</section>
